version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(ci)"
    groups:
      fw-ci-templates:
        patterns:
          - "NVIDIA-NeMo/FW-CI-templates"
      github-actions:
        patterns:
          - "actions/*"
          - "astral-sh/*"
          - "codecov/*"
