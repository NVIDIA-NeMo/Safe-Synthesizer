name: "Setup Python Environment"
description: "Common setup for Python projects: checkout, uv, Python, and dependencies"

inputs:
  ref:
    description: "Git ref to checkout (branch, tag, or SHA). Defaults to the triggering event ref."
    required: false
    default: ""
  python-version:
    description: "Python version to use (defaults to .python-version when empty)"
    required: false
    default: ""
  fetch-depth:
    description: "Number of commits to fetch (0 for all history)"
    required: false
    default: "1"
  bootstrap-tools:
    description: "Whether to install dev tools via mise"
    required: false
    default: "true"

outputs:
  merge-base:
    description: "The merge base SHA (only available when fetch-depth is 0)"
    value: ${{ steps.get_merge_base.outputs.merge_base }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref || github.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Get the merge base SHA
      id: get_merge_base
      if: inputs.fetch-depth == '0'
      shell: bash
      run: |
        if [ -n "${{ github.base_ref }}" ]; then
          # Pull request: diff against the merge base with the target branch
          MERGE_BASE_SHA=$(git merge-base origin/${{ github.base_ref }} ${{ github.sha }})
        else
          # Push to branch: diff against the previous commit
          MERGE_BASE_SHA=$(git rev-parse HEAD~1)
        fi
        echo "Merge Base SHA: $MERGE_BASE_SHA"
        echo "merge_base=$MERGE_BASE_SHA" >> $GITHUB_OUTPUT

    - name: Set up Python ${{ inputs.python-version }}
      if: inputs.python-version != ''
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up Python from .python-version
      if: inputs.python-version == ''
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"

    - name: Install mise and dev tools (uv, ruff, ty, etc.)
      if: inputs.bootstrap-tools == 'true'
      shell: bash
      run: |
        make setup
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

    - name: Install uv (fallback when mise is skipped)
      if: inputs.bootstrap-tools != 'true'
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
