name: "Detect Changes"
description: >
  Detect which file categories changed using dorny/paths-filter.
  Outputs boolean flags that downstream jobs use to decide whether to run.

outputs:
  src:
    description: "'true' if any file under src/ changed"
    value: ${{ steps.filter.outputs.src }}
  test:
    description: "'true' if any file under tests/ or pytest.ini changed"
    value: ${{ steps.filter.outputs.tests == 'true' || steps.filter.outputs.pytest_ini == 'true' }}
  deps:
    description: "'true' if any dep related files changed"
    value: ${{ steps.filter.outputs.pyproject == 'true' || steps.filter.outputs.uv_lock == 'true' }}

runs:
  using: "composite"
  steps:
    # Requires actions/checkout to have been run first so that
    # (a) this action.yml can be found, and
    # (b) dorny/paths-filter can diff against git history on push events.
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          src:
            - 'src/**'
          tests:
            - 'tests/**'
          pyproject:
            - 'pyproject.toml'
          uv_lock:
            - 'uv.lock'
          pytest_ini:
            - 'pytest.ini'
