name: DCO Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  DCOAssistant:
    if: github.repository_owner == 'NVIDIA-NeMo'
    runs-on: ubuntu-latest
    steps:
      - name: DCO Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Path to store DCO signatures
          path-to-signatures: "dco-signatures.json"
          # Branch to store signatures
          branch: "signatures"
          # Users/bots that can bypass DCO
          allowlist: dependabot[bot],github-actions[bot]
          # Custom message for unsigned commits
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need you to sign the Developer Certificate of Origin (DCO).

            To sign, please add a "Signed-off-by" line to your commit messages:
            ```
            Signed-off-by: Your Name <your.email@example.com>
            ```

            You can do this by:
            1. Amending your commits: `git commit --amend -s`
            2. Or by commenting on this PR with: `I have read the DCO Document and I hereby sign the DCO`

            For more information, see our [DCO documentation](DCO).
          # Custom message for signed commits
          custom-allsigned-prcomment: |
            All commits are signed! Thank you for signing the DCO.
          # Allow re-checking DCO status
          allowRecheck: true
          # Command to trigger recheck
          recheckCommand: "recheck"
