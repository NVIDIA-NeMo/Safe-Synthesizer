name: CI - checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which files changed so downstream jobs can be skipped when only
  # docs, config, or other non-source files are modified.  The "ci-status"
  # summary job (below) is the single required check for branch protection,
  # so skipped jobs won't block merge.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    # Set job outputs to values from filter step
    outputs:
      src: ${{ steps.filter.outputs.src }}
      test: ${{ steps.filter.outputs.test }}
    steps:
      # For pull requests it's not necessary to checkout the code
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
            test:
              - 'test/**'

  format:
    name: Format
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Check code formatting
        run: |
          make bootstrap-nss dev
          bash tools/format/format.sh ${{ steps.setup.outputs.merge-base }}

  lint:
    name: Lint
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ruff linting
        run: |
          make bootstrap-nss dev
          bash tools/lint/ruff-lint.sh ${{ steps.setup.outputs.merge-base }}

  typecheck:
    name: Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ty type checks
        run: |
          make bootstrap-nss cpu
          bash tools/lint/run-ty-check.sh ${{ steps.setup.outputs.merge-base }}

  unit-test:
    name: Unit Tests - (Python ${{ matrix.python-version }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.test == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          bootstrap-tools: "true"

      - name: Run unit tests with coverage
        run: |
          make bootstrap-nss cpu
          make test-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Single required status check for branch protection.  Always runs so that
  # the check is present even when path filters cause the real CI jobs to be
  # skipped (result == "skipped" is treated as passing).
  # ---------------------------------------------------------------------------
  ci-status:
    name: CI Status
    if: always()
    needs: [changes, format, lint, typecheck, unit-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results=(
            "${{ needs.format.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.unit-test.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ CI failed (result: $result)"
              exit 1
            fi
          done
          echo "✅ All CI jobs passed or were skipped"
