name: ci-checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Check code formatting
        run: |
          make bootstrap-nss dev
          bash tools/format/format.sh ${{ steps.setup.outputs.merge-base }}
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ruff linting
        run: |
          make bootstrap-nss dev
          bash tools/lint/ruff-lint.sh ${{ steps.setup.outputs.merge-base }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ty type checks
        run: |
          make bootstrap-nss cpu
          bash tools/lint/run-ty-check.sh ${{ steps.setup.outputs.merge-base }}

  unit-test:
    name: Unit Tests - (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          bootstrap-tools: "true"

      - name: Run unit tests with coverage
        run: |
          make bootstrap-nss cpu
          make test-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
