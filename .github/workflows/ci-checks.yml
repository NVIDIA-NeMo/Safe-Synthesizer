name: CI - checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which files changed so downstream jobs can be skipped when only
  # docs, config, or other non-source files are modified.  The "ci-status"
  # summary job (below) is the single required check for branch protection,
  # so skipped jobs won't block merge.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Set job outputs to values from filter step
    outputs:
      src: ${{ steps.filter.outputs.src }}
      test: ${{ steps.filter.outputs.test }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
            test:
              - 'test/**'

  format:
    name: Format
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Check code formatting
        run: |
          make bootstrap-nss dev
          bash tools/format/format.sh --check ${{ steps.setup.outputs.merge-base }}

  lint:
    name: Lint
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ruff linting
        run: |
          make bootstrap-nss dev
          bash tools/lint/ruff-lint.sh ${{ steps.setup.outputs.merge-base }}

  typecheck:
    name: Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ty type checks
        run: |
          make bootstrap-nss cpu
          bash tools/lint/run-ty-check.sh ${{ steps.setup.outputs.merge-base }}

  unit-test:
    name: Unit Tests - (Python ${{ matrix.python-version }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.test == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          bootstrap-tools: "true"

      - name: Run unit tests with coverage
        run: |
          make bootstrap-nss cpu
          make test-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  gpu-e2e-test:
    name: GPU E2E Tests - (Python ${{ matrix.python-version }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.test == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: linux-amd64-gpu-a100-latest-1
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          bootstrap-tools: "true"

      - name: Run unit tests with coverage
        run: |
          make bootstrap-nss cu128
          make test-e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false