name: CI - checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which files changed so downstream jobs can be skipped when only
  # docs, config, or other non-source files are modified.  The "ci-status"
  # summary job (below) is the single required check for branch protection,
  # so skipped jobs won't block merge.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.changes.outputs.src }}
      test: ${{ steps.changes.outputs.test }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect changes
        id: changes
        uses: ./.github/actions/detect-changes

  format:
    name: Format
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Check code formatting
        run: |
          make bootstrap-nss dev
          bash tools/codestyle/format.sh --check

      - name: Check SPDX copyright headers
        run: |
          uv run --script tools/codestyle/copyright_fixer.py --check .

  lint:
    name: Lint
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ruff linting
        run: |
          make bootstrap-nss dev
          bash tools/codestyle/lint.sh

      - name: Check uv.lock is up to date
        run: |
          uv lock
          git diff --exit-code uv.lock

  typecheck:
    name: Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          fetch-depth: 0
          bootstrap-tools: "true"

      - name: Run ty type checks
        run: |
          make bootstrap-nss cpu
          bash tools/codestyle/typecheck.sh

  unit-test:
    name: Unit Tests - (Python ${{ matrix.python-version }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.test == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          bootstrap-tools: "true"

      - name: Run unit tests with coverage
        run: |
          make bootstrap-nss cpu
          make test-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.json
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Single required status check for branch protection.
  # Aggregates results from all upstream jobs so that skipped jobs (due to
  # path filtering) don't block merge.
  # ---------------------------------------------------------------------------
  ci-status:
    name: CI Status
    if: always() && !cancelled()
    needs: [changes, format, lint, typecheck, unit-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "changes:   ${{ needs.changes.result }}"
          echo "format:    ${{ needs.format.result }}"
          echo "lint:      ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "unit-test: ${{ needs.unit-test.result }}"

          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI jobs passed (or were skipped)."
