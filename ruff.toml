# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "unsloth_compiled_cache"
    ]

line-length = 120
indent-width = 4

[lint]
select = [
    # pycodestyle
    "E4",   # import errors
    "E7",   # statement errors
    "E9",   # runtime errors
    # pyflakes
    "F",
    # whitespace
    "W291", # trailing whitespace
    "W292", # no newline at end of file
    "W293", # whitespace before comment
    # isort
    "I001", # unsorted imports
    "I002", # missing required import
    # pyupgrade -- modern Python 3.11+ syntax
    "UP006", # use builtin generics (list, dict, set, tuple)
    "UP007", # use X | Y for unions and optionals
    # flake8-bugbear
    "B006",  # mutable default argument
    # flake8-print
    "T201",  # print() found
]
ignore = []

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"tests/**" = ["T201"]    # print() is fine in tests
"tools/**" = ["T201"]    # print() is fine in tooling scripts
"script/**" = ["T201"]   # print() is fine in standalone scripts

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"
