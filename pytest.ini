[pytest]

# Python files and directories to search for tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = ["."]

# Test discovery paths - packages and stable services
testpaths =
    tests

# Markers for different test categories
# Usage: @pytest.mark.<marker_name>
markers =
    unit: Unit tests - test single classes/functions with no infrastructure dependencies
    slow: Tests that take a long time to run
    smoke: Smoke tests - quick tests exercising training/generation hot paths with tiny models
    e2e: End-to-end tests - test the entire pipeline from data to generation to evaluation
    requires_gpu: Test needs CUDA hardware (orthogonal modifier, stacks on smoke/e2e)
    noautouse: Marker to skip autouse fixtures for specific tests

# Note: Unit tests (testing single classes/functions with no infrastructure dependencies)
# do not need markers and are the default test type.

# Asyncio configuration
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# default command line options which are override by command line options passed directly
addopts =
    --verbose
    --strict-markers
    --tb=long
    # Coverage options (can be overridden by command line)
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Parallelization options (can be overridden by command line)
    -n 8
    --maxprocesses=8 
    # Show test durations for slowest tests
    -ra

# Minimum pytest version
minversion = 8.0

# Test timeout (in seconds) - can be overridden per test with @pytest.mark.timeout
# Helps catch hanging tests
timeout = 300
timeout_method = thread

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pytest_only.version
    ignore:pkg_resources is deprecated:UserWarning:pymilvus
    ignore:stdout is .* tty:UserWarning:nemo_safe_synthesizer.observability
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning

# Paths to ignore during test collection
norecursedirs =
    .git
    .tox
    .eggs
    dist
    build
    docs
    .venv
    __pycache__
    *.egg-info
    .uv_cache
    node_modules
    .github
    .gitlab

