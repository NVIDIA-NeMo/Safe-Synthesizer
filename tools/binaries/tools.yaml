# Tool definitions for bootstrap_tools.sh
# Supported platforms: darwin (arm64, amd64), linux (arm64, amd64)
#
# URL placeholders:
#   {version} - tool version
#   {os}      - operating system (darwin, linux) - can be remapped via os_map
#   {arch}    - architecture (amd64, arm64) - can be remapped via arch_map

tools:
  jq:
    version: "1.8.1"
    check_command: "jq --version"
    url: "https://github.com/jqlang/jq/releases/download/jq-{version}/jq-{os}-{arch}"
    os_map:
      darwin: "macos"

  osv-scanner:
    version: "v2.2.3"
    check_command: "osv-scanner --version"
    url: "https://github.com/google/osv-scanner/releases/download/{version}/osv-scanner_{os}_{arch}"

  buildctl:
    version: "0.27.1"
    check_command: "buildctl --version"
    url: "https://github.com/moby/buildkit/releases/download/v{version}/buildkit-v{version}.{os}-{arch}.tar.gz"
    extract: "bin/buildctl"
    darwin_brew: "buildkit"
    post_install: |
      echo "To use buildkit, create a builder:"
      echo "  docker buildx create --bootstrap --use --name local-docker"

  yq:
    version: "v4.44.1"
    check_command: "yq --version"
    url: "https://github.com/mikefarah/yq/releases/download/{version}/yq_{os}_{arch}"
    bootstrap: true

  ruff:
    version: "0.15.0"
    check_command: "ruff --version"
    url: "https://github.com/astral-sh/ruff/releases/download/{version}/ruff-{arch}-{os}.tar.gz"
    extract: "ruff-{arch}-{os}/ruff"
    os_map:
      darwin: "apple-darwin"
      linux: "unknown-linux-gnu"
    arch_map:
      arm64: "aarch64"
      amd64: "x86_64"
    bootstrap: true

  ty:
    version: "0.23"
    check_command: "ty --version"
    url: "https://github.com/astral-sh/ty/releases/download/{version}/ty-{arch}-{os}.tar.gz"
    extract: "ty-{arch}-{os}/ty"
    os_map:
      darwin: "apple-darwin"
      linux: "unknown-linux-gnu"
    arch_map:
      arm64: "aarch64"
      amd64: "x86_64"
    bootstrap: true

  gh:
    version: "2.87.0"
    check_command: "gh --version"
    url: "https://github.com/cli/cli/releases/download/v{version}/gh_{version}_{os}_{arch}.tar.gz"
    extract: "gh_{version}_{os}_{arch}/bin/gh"
    os_map:
      darwin: "macOS"

# Tools with custom install scripts (complex logic)
custom_scripts:
  - name: direnv
    script: install_direnv.sh
  - name: uv
    script: install_uv.sh
    bootstrap: true
