default_install_hook_types: [pre-commit, commit-msg, pre-push]
exclude: |
          (?x)^./(
              SECURITY.md|
              CONTRIBUTING.md|
              CODE_OF_CONDUCT.md|
              DCO|
              LICENSE|
              THIRD_PARTY.md|
              THIRD_PARTY.md
          )$


repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        args:
          - --assume-in-merge

      - id: end-of-file-fixer
        files: ".*\\.(py|sh|toml|yaml|yml|md|rst|txt)$"

      - id: trailing-whitespace
        files: ".*\\.(py|sh|toml|yaml|yml|md|rst|txt)$"

      - id: check-merge-conflict
        args:
          - --assume-in-merge


  - repo: local
    hooks:

      - id: ruff-format
        name: Run ruff format
        entry: bash tools/format/format.sh
        language: system
        pass_filenames: true
        types: [python]

      - id: ruff-lint
        name: Run ruff linting
        entry: bash tools/lint/ruff-lint.sh
        language: system
        pass_filenames: true
        types: [python]

      - id: ty
        name: Run ty typechecks
        entry: bash tools/lint/run-ty-check.sh
        language: system
        pass_filenames: false
        types: [python]

      - id: uv-lock
        name: Run uv lock and check for uv.lock drift
        entry: bash -c 'uv lock && git diff --exit-code uv.lock'
        language: system
        files: 'pyproject\.toml$'
        pass_filenames: false
        verbose: true

      - id: copyright-fix
        name: Fix copyright headers
        entry: uv run --script tools/lint/copyright_fixer.py
        language: system
        pass_filenames: true
        files: '\.(py|sh|md|yaml|yml)$'

      - id: check-signoff
        name: Check commit is signed off (DCO)
        entry: "grep -qE '^Signed-off-by: .+ <.+>'"
        language: system
        stages: [commit-msg]
        always_run: true
